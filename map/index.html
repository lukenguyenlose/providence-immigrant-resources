<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource Map — Providence Immigrant Resources</title>
  <meta name="description" content="Interactive map of food banks, transitional housing, legal aid, healthcare, education, and employment resources for immigrants in Providence, RI.">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="../" class="brand" data-i18n="siteTitle">Providence Immigrant Resources</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="../" data-i18n="navHome">Home</a>
        <a href="./" class="active" data-i18n="navMap">Map</a>
        <a href="../benefits/" data-i18n="navBenefits">Benefits guide</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Language">
        <button data-lang="en" class="active">EN</button>
        <button data-lang="es">ES</button>
        <button data-lang="pt">PT</button>
        <button data-lang="ht">HT</button>
      </div>
    </div>
  </header>

  <section class="page-intro">
    <h1 data-i18n="mapPageTitle">Resource map</h1>
    <p data-i18n="mapPageTagline">Click a pin or a card to see details, hours, languages, and directions.</p>
  </section>

  <main class="map-layout">
    <aside class="sidebar">
      <section class="panel">
        <h2 data-i18n="filterHeading">Filter by category</h2>
        <input id="search" type="search" class="search-input"
               data-i18n-placeholder="searchPlaceholder"
               placeholder="Search by name or neighborhood...">
        <div id="filters" class="filters" style="margin-top:.6rem"></div>
      </section>

      <section class="panel">
        <h2 data-i18n="listHeading">Resources</h2>
        <div id="resource-list" class="resource-list"></div>
      </section>
    </aside>

    <section>
      <div id="map" role="region" aria-label="Map of resources"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p data-i18n="disclaimer">Information here is provided for community reference. Always call ahead to confirm hours and eligibility.</p>
    <p><span data-i18n="lastUpdated">Last updated</span>: <span id="last-updated">—</span></p>
  </footer>

  <script src="../js/translations.js"></script>
  <script>window.RESOURCES_PATH = "../data/resources.json";</script>
  <script src="../js/app.js"></script>
</body>
</html>
